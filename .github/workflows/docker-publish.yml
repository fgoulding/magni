# Build the image in CI and push it to GitHub Container Registry (GHCR).
#
#   push to main  -> publishes :latest  (Watchtower on the server auto-redeploys)
#   push a v* tag -> publishes :vX.Y.Z   (a pinned, rollback-able release)
#
# The deploy stack runs `image: ghcr.io/OWNER/REPO:latest`; Watchtower pulls new
# :latest images automatically. See deploy/README.md.
name: Publish image

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache every layer (incl. the apt + `npm ci` deps stage) in the GitHub
          # Actions cache. Subsequent builds reuse them, so a transient apt/npm
          # network hiccup no longer fails the build once a good cache exists.
          cache-from: type=gha
          cache-to: type=gha,mode=max
